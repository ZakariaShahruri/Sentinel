<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-label="Vibration dashboard screenshot placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" rx="16" fill="url(#bg)"/>
  <!-- browser chrome -->
  <rect x="40" y="40" width="1120" height="52" rx="12" fill="#020617" opacity="0.6"/>
  <circle cx="72" cy="66" r="7" fill="#f87171"/>
  <circle cx="98" cy="66" r="7" fill="#fbbf24"/>
  <circle cx="124" cy="66" r="7" fill="#34d399"/>
  <rect x="170" y="54" width="620" height="24" rx="12" fill="#0f172a"/>
  <text x="190" y="71" font-family="ui-monospace, monospace" font-size="14" fill="#64748b">localhost:3000  ·  Sentinel — Vibration Dashboard</text>
  <!-- title -->
  <text x="600" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="46" font-weight="700" fill="#e2e8f0">🛰️  Vibration Dashboard</text>
  <text x="600" y="384" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" fill="url(#accent)">Real-time node status · live sensor charts · event feed · alarms</text>
  <text x="600" y="470" text-anchor="middle" font-family="ui-monospace, monospace" font-size="16" fill="#475569">Placeholder — replace with a real screenshot at docs/screenshots/dashboard.png</text>
  <rect x="360" y="520" width="480" height="2" fill="#1e293b"/>
</svg>
